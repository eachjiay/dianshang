services:
  backend:
    build: ./backend
    container_name: diquan-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=5000
      - DB_PATH=/app/data/database.sqlite
      - JWT_SECRET=${JWT_SECRET:-please_change_this_secret}
    restart: always

  frontend:
    build: ./frontend
    container_name: diquan-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
