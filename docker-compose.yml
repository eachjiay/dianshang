services:
  backend:
    build: ./backend
    container_name: diquan-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=5000
      - DB_PATH=/app/data/database.sqlite
      - JWT_SECRET=${JWT_SECRET:-please_change_this_secret}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  frontend:
    build: ./frontend
    container_name: diquan-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
